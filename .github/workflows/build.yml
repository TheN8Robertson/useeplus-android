name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            platform-tools
            cmake;3.22.1
            ndk;27.2.12479018

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Locate APK
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          if [ -z "$APK" ]; then
            echo "APK not found" >&2
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "APK: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: useeplus-endoscope-debug-${{ github.sha }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30
